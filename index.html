<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Activity 12 - Chuck Norris Vue</title>
    <!-- Vue, style & bootstrap-->
    <script src="https://cdn.jsdelivr.net/npm/vue/dist/vue.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div id="app" class="contenedor mt-4">
        <h2>Lista de chistes con componente</h2>
        <div class="row">
            <div class="col-12 col-sm-12 col-md-4 mb-3" v-for="(joke, index) in chuck" :key="index">
                <chuck-card 
                    :icon_url="joke.icon_url"
                    :value="joke.value">
                </chuck-card>
            </div>
        </div>
    </div>
    <script src="main.js"></script>
</body>
</html>
